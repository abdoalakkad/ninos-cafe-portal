<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nino's Coffee | نظام الحضور</title>
    <style>
        body { background-color: #F0F8FF; font-family: Arial, sans-serif; text-align: center; color: #000; }
        .container { margin-top: 50px; padding: 20px; }
        img { width: 150px; border-radius: 50%; }
        h1 { color: #000; }
        .btn { 
            background-color: #FFEB3B; border: 2px solid #000; padding: 15px 30px; 
            font-size: 20px; font-weight: bold; border-radius: 10px; cursor: pointer; width: 80%; margin: 10px;
        }
        .status { margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <img src="ninos_logo.png" alt="Nino's Logo">
        <h1 id="welcome">أهلاً بك في نينوس</h1>
        
        <div id="staff-section">
            <button class="btn" onclick="register('حضور')">تسجيل حضور ✅</button>
            <button class="btn" onclick="register('انصراف')">تسجيل انصراف 🏁</button>
        </div>
        <p class="status" id="msg"></p>
    </div>

    <script>
        // استلام الاسم من اللينك
        const urlParams = new URLSearchParams(window.location.search);
        const name = urlParams.get('name');
        if(name) {
            document.getElementById('welcome').innerText = "يا مساء الفل يا " + name;
        }

        function register(type) {
            document.getElementById('msg').innerText = "جاري تسجيل الـ " + type + "...";
            // هنا السيستم بيسجل البيانات (ممكن نربطها بـ Google Sheets لاحقاً)
            setTimeout(() => {
                document.getElementById('msg').innerText = "تم تسجيل " + type + " بنجاح يا " + (name || "بطل");
                document.getElementById('msg').style.color = "green";
            }, 1500);
        }
    </script>
</body>
</html>
